services:
  ioas-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: tree-education-ioas:latest
    container_name: tree-education-ioas
    restart: unless-stopped
    env_file:
      - .env
    environment:
      IOAS_SERVER_PORT: ${IOAS_SERVER_PORT:-8080}
      IOAS_REDIS_HOST: ${IOAS_REDIS_HOST:-121.41.65.26}
      IOAS_REDIS_PORT: ${IOAS_REDIS_PORT:-16379}

      # Internal Docker-network MinIO endpoint used only by backend services.
      IOAS_MINIO_ENDPOINT: http://minio:9000

      # Public HTTPS MinIO endpoint used to generate browser-facing presigned URLs.
      IOAS_MINIO_PUBLIC_ENDPOINT: ${IOAS_MINIO_PUBLIC_ENDPOINT:-https://minioapi.ldbbd.com}
      IOAS_STORAGE_PUBLIC_BASE_URL: ${IOAS_STORAGE_PUBLIC_BASE_URL:-https://minioapi.ldbbd.com/ioas-assets}

      IOAS_MINIO_ACCESS_KEY: ${IOAS_MINIO_ACCESS_KEY:-minioadmin}
      IOAS_MINIO_SECRET_KEY: ${IOAS_MINIO_SECRET_KEY:-minioadmin123}
      IOAS_STORAGE_BUCKET: ${IOAS_STORAGE_BUCKET:-ioas-assets}

      # Internal Docker-network recognition service. Do not use host.docker.internal on Linux.
      IOAS_RECOGNITION_BASE_URL: ${IOAS_RECOGNITION_BASE_URL:-http://tree-education-datacollecting-paddle:18083}
      IOAS_RECOGNITION_RECOGNIZE_PATH: ${IOAS_RECOGNITION_RECOGNIZE_PATH:-/api/v1/recognize}

      # Allow GB-level media/document uploads through Spring Boot multipart handling.
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:-5GB}
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:-5GB}
    ports:
      - "${IOAS_HOST_PORT:-18080}:${IOAS_SERVER_PORT:-8080}"
    depends_on:
      - minio
    networks:
      - ioas-network

  minio:
    image: minio/minio:latest
    container_name: ioas-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${IOAS_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${IOAS_MINIO_SECRET_KEY:-minioadmin123}

      # Public HTTPS API address exposed through FRPC + Alibaba Cloud Nginx.
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-https://minioapi.ldbbd.com}

      # Public HTTPS console address exposed through FRPC + Alibaba Cloud Nginx.
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-https://minioconsole.ldbbd.com}

      # Allow browser direct uploads from the HTTPS frontend domain.
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-https://ioasfrontend.ldbbd.com}
    ports:
      # Host API port -> MinIO container API port. FRPC maps local 19000 to minioapi.ldbbd.com.
      - "${IOAS_MINIO_API_HOST_PORT:-19000}:9000"

      # Host Console port -> MinIO container Console port. FRPC maps local 19001 to minioconsole.ldbbd.com.
      - "${IOAS_MINIO_CONSOLE_HOST_PORT:-19001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - ioas-network

networks:
  ioas-network:
    driver: bridge

volumes:
  minio-data:
