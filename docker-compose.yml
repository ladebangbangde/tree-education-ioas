services:
  ioas-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: tree-education-ioas:latest
    container_name: tree-education-ioas
    restart: unless-stopped
    env_file:
      - .env
    environment:
      IOAS_SERVER_PORT: ${IOAS_SERVER_PORT:-8080}
      IOAS_REDIS_HOST: ${IOAS_REDIS_HOST:-121.41.65.26}
      IOAS_REDIS_PORT: ${IOAS_REDIS_PORT:-16379}
      IOAS_MINIO_ENDPOINT: http://minio:9000
      IOAS_MINIO_ACCESS_KEY: ${IOAS_MINIO_ACCESS_KEY:-minioadmin}
      IOAS_MINIO_SECRET_KEY: ${IOAS_MINIO_SECRET_KEY:-minioadmin123}
      IOAS_STORAGE_BUCKET: ${IOAS_STORAGE_BUCKET:-ioas-assets}

      # 改动1：后端返回给前端的文件公网访问地址
      # 以前默认 localhost:9000，公网访问会不对
      IOAS_STORAGE_PUBLIC_BASE_URL: ${IOAS_STORAGE_PUBLIC_BASE_URL:-http://minio.ldbbd.com/ioas-assets}
    ports:
      - "${IOAS_HOST_PORT:-18080}:${IOAS_SERVER_PORT:-8080}"
    depends_on:
      - minio
    networks:
      - ioas-network

  minio:
    image: minio/minio:latest
    container_name: ioas-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${IOAS_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${IOAS_MINIO_SECRET_KEY:-minioadmin123}

      # 改动2：告诉 MinIO 自己的公网 API 地址
      # 解决通过 frp / 域名访问时 Console 一直 Loading 的问题
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://minio.ldbbd.com}

      # 改动3：告诉 MinIO Console 自己的公网访问地址
      # 解决浏览器 JS 找不到正确后端地址的问题
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://minio.ldbbd.com}
    ports:
      # 改动4：宿主机 API 端口改成 19000，避免和已有 9000 冲突
      - "${IOAS_MINIO_API_HOST_PORT:-19000}:9000"

      # 改动5：宿主机 Console 端口改成 19001，避免和已有 9001 冲突
      - "${IOAS_MINIO_CONSOLE_HOST_PORT:-19001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - ioas-network

networks:
  ioas-network:
    driver: bridge

volumes:
  minio-data: