spring:
  application:
    name: tree-education-ioas
  datasource:
    url: ${IOAS_DATASOURCE_URL:jdbc:mysql://localhost:3306/tree_education_ioas?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${IOAS_DATASOURCE_USERNAME:ioas}
    password: ${IOAS_DATASOURCE_PASSWORD:ioas_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${IOAS_REDIS_HOST:localhost}
      port: ${IOAS_REDIS_PORT:6379}
server:
  port: ${IOAS_SERVER_PORT:8080}

ioas:
  jwt:
    issuer: tree-education-ioas
    secret: ${IOAS_JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me-change-me}
    expires-minutes: ${IOAS_JWT_EXPIRES_MINUTES:1440}
  storage:
    provider: ${IOAS_STORAGE_PROVIDER:minio}
    endpoint: ${IOAS_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${IOAS_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${IOAS_MINIO_SECRET_KEY:minioadmin}
    bucket: ${IOAS_STORAGE_BUCKET:ioas-assets}
    public-base-url: ${IOAS_STORAGE_PUBLIC_BASE_URL:http://localhost:9000/ioas-assets}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
