server:
  port: ${IOAS_SERVER_PORT:1201}

spring:
  application:
    name: tree-education-ioas
  servlet:
    multipart:
      enabled: true
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:5GB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:5GB}
  datasource:
    url: ${IOAS_DB_URL:${IOAS_DATASOURCE_URL:jdbc:mysql://localhost:3306/tree_education_ioas?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}}
    username: ${IOAS_DB_USERNAME:${IOAS_DATASOURCE_USERNAME:root}}
    password: ${IOAS_DB_PASSWORD:${IOAS_DATASOURCE_PASSWORD:root}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${IOAS_REDIS_HOST:localhost}
      port: ${IOAS_REDIS_PORT:6379}
      password: ${IOAS_REDIS_PASSWORD:}
      database: ${IOAS_REDIS_DATABASE:0}

ioas:
  jwt:
    issuer: tree-education-ioas
    secret: ${IOAS_JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me-change-me}
    expires-minutes: ${IOAS_JWT_EXPIRES_MINUTES:1440}
  storage:
    provider: ${IOAS_STORAGE_PROVIDER:minio}
    endpoint: ${IOAS_MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${IOAS_MINIO_PUBLIC_ENDPOINT:${IOAS_MINIO_ENDPOINT:http://localhost:9000}}
    access-key: ${IOAS_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${IOAS_MINIO_SECRET_KEY:minioadmin}
    bucket: ${IOAS_STORAGE_BUCKET:ioas-assets}
    public-base-url: ${IOAS_STORAGE_PUBLIC_BASE_URL:http://localhost:9000/ioas-assets}
  recognition:
    enabled: ${IOAS_RECOGNITION_ENABLED:true}
    base-url: ${IOAS_RECOGNITION_BASE_URL:http://tree-education-datacollecting:18083}
    recognize-path: ${IOAS_RECOGNITION_RECOGNIZE_PATH:/api/v1/recognize}
    token: ${IOAS_RECOGNITION_TOKEN:dev-recognition-token}
    connect-timeout-ms: ${IOAS_RECOGNITION_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${IOAS_RECOGNITION_READ_TIMEOUT_MS:60000}
  task:
    max-user-running: ${IOAS_TASK_MAX_USER_RUNNING:3}
    max-global-running: ${IOAS_TASK_MAX_GLOBAL_RUNNING:20}
    cleanup:
      enabled: ${IOAS_TASK_CLEANUP_ENABLED:true}
      fixed-delay-ms: ${IOAS_TASK_CLEANUP_FIXED_DELAY_MS:300000}
      interrupted-retention-hours: ${IOAS_TASK_INTERRUPTED_RETENTION_HOURS:24}
      failed-retention-days: ${IOAS_TASK_FAILED_RETENTION_DAYS:7}
      cancelled-retention-days: ${IOAS_TASK_CANCELLED_RETENTION_DAYS:7}
      success-log-retention-days: ${IOAS_TASK_SUCCESS_LOG_RETENTION_DAYS:30}
    log-dir: ${IOAS_TASK_LOG_DIR:/app/logs/upload-tasks}
  wecom:
    enabled: ${IOAS_WECOM_ENABLED:false}
    corp-id: ${IOAS_WECOM_CORP_ID:}
    agent-id: ${IOAS_WECOM_AGENT_ID:}
    secret: ${IOAS_WECOM_SECRET:}
    callback-token: ${IOAS_WECOM_CALLBACK_TOKEN:}
    api-base-url: https://qyapi.weixin.qq.com

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
