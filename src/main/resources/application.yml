spring:
  application:
    name: tree-education-ioas
  datasource:
    url: ${IOAS_DATASOURCE_URL:jdbc:mysql://121.41.95.26:33306/tree_education_ioas?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${IOAS_DATASOURCE_USERNAME:root}
    password: ${IOAS_DATASOURCE_PASSWORD:ldbbd@2025}
  servlet:
    multipart:
      enabled: true
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:5GB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:5GB}
      file-size-threshold: ${SPRING_SERVLET_MULTIPART_FILE_SIZE_THRESHOLD:2MB}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${IOAS_REDIS_HOST:121.41.65.26}
      port: ${IOAS_REDIS_PORT:16379}
server:
  port: ${IOAS_SERVER_PORT:1201}
  tomcat:
    connection-timeout: ${SERVER_TOMCAT_CONNECTION_TIMEOUT:30m}
    max-swallow-size: ${SERVER_TOMCAT_MAX_SWALLOW_SIZE:-1}
    max-http-form-post-size: ${SERVER_TOMCAT_MAX_HTTP_FORM_POST_SIZE:-1}

ioas:
  jwt:
    issuer: tree-education-ioas
    secret: ${IOAS_JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me-change-me}
    expires-minutes: ${IOAS_JWT_EXPIRES_MINUTES:1440}
  storage:
    provider: ${IOAS_STORAGE_PROVIDER:minio}
    endpoint: ${IOAS_MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${IOAS_MINIO_PUBLIC_ENDPOINT:${IOAS_MINIO_ENDPOINT:http://localhost:9000}}
    access-key: ${IOAS_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${IOAS_MINIO_SECRET_KEY:minioadmin}
    bucket: ${IOAS_STORAGE_BUCKET:ioas-assets}
    public-base-url: ${IOAS_STORAGE_PUBLIC_BASE_URL:http://localhost:9000/ioas-assets}
  task:
    max-user-running: ${IOAS_TASK_MAX_USER_RUNNING:3}
    max-global-running: ${IOAS_TASK_MAX_GLOBAL_RUNNING:20}
    cleanup:
      fixed-delay-ms: ${IOAS_TASK_CLEANUP_FIXED_DELAY_MS:300000}
    log-dir: ${IOAS_TASK_LOG_DIR:/app/logs/upload-tasks}
  wecom:
    enabled: ${IOAS_WECOM_ENABLED:false}
    corp-id: ${IOAS_WECOM_CORP_ID:}
    agent-id: ${IOAS_WECOM_AGENT_ID:}
    secret: ${IOAS_WECOM_SECRET:}
    callback-token: ${IOAS_WECOM_CALLBACK_TOKEN:}
    api-base-url: https://qyapi.weixin.qq.com

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
