# Put this inside the server/location that proxies ioasbackend.ldbbd.com to Spring Boot.
# This config is required for GB-level video upload. Without it the browser can show
# net::ERR_CONNECTION_RESET before the request reaches Spring Boot.

client_max_body_size 5g;
client_body_timeout 3600s;
send_timeout 3600s;

location / {
    proxy_pass http://127.0.0.1:18080;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;

    # Important for large uploads. Do not let nginx buffer the whole video body first.
    proxy_request_buffering off;
    proxy_buffering off;
}
